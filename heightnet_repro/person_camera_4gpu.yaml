seed: 42
device: cuda
paths:
  train_manifest: /data1/zhaoyd/heightnet_repro/data/person_camera_run/train_manifest.csv
  val_manifest: /data1/zhaoyd/heightnet_repro/data/person_camera_run/val_manifest.csv
  test_manifest: /data1/zhaoyd/heightnet_repro/data/person_camera_run/test_manifest.csv
  output_dir: /data1/zhaoyd/heightnet_repro/runs/person_camera_4gpu
train:
  epochs: 20
  batch_size: 16
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  use_amp: true
  use_tensorboard: true
  log_interval: 20
  tb_num_images: 4
loss:
  silog_lambda: 0.85
  consistency_weight: 0.1
  consistency_warmup_epochs: 5
data:
  image_size:
  - 352
  - 704
  normalize_rgb: true
  use_pair_consistency: true
  max_matches: 512
model:
  name: heightnet_tiny
  base_channels: 32
eval:
  save_visualizations: true
  vis_limit: 20
runtime_seg:
  enabled: false
  model_path: ''
  conf: 0.25
  iou: 0.7
  imgsz: 640
  strict_native: true
