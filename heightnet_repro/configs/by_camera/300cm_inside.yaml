seed: 42
device: cuda
paths:
  train_manifest: /data1/zhaoyd/heightnet_manifests_by_camera/300cm_inside/train_manifest.csv
  val_manifest: /data1/zhaoyd/heightnet_manifests_by_camera/300cm_inside/val_manifest.csv
  test_manifest: /data1/zhaoyd/heightnet_manifests_by_camera/300cm_inside/test_manifest.csv
  train_video_root: ''
  val_video_root: ''
  test_video_root: ''
  bg_depth_root: /data1/zhaoyd/2503_test_bg_depthmap
  output_dir: /data1/zhaoyd/heightnet_repro/runs/by_camera/300cm_inside
train:
  epochs: 100
  batch_size: 8
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  use_amp: true
  use_tensorboard: true
  log_interval: 20
  tb_num_images: 4
loss:
  lambda_rmse: 1.0
  lambda_rank: 1.0
  lambda_cons: 0.1
  eps: 1.0e-06
  min_valid_pixels: 64
  min_valid_ratio: 0.002
  pairwise_json: /data1/zhaoyd/heightnet_repro/data/pairwise_rank/all_pairs.json
data:
  image_size:
  - 352
  - 704
  normalize_rgb: true
  use_pair_consistency: true
model:
  name: heightnet_tiny
  base_channels: 32
  comparator_channels: 16
eval:
  save_visualizations: true
  vis_limit: 20
runtime_seg:
  enabled: true
  model_path: /data1/zhaoyd/models/yolov8n-seg.pt
  conf: 0.25
  iou: 0.7
  imgsz: 640
  strict_native: true
runtime_depth:
  enabled: true
  depthanything_root: /data1/zhaoyd/Depth-Anything-V2
  encoder: vits
  checkpoint: /data1/zhaoyd/models/depth_anything_v2_vits.pth
  input_size: 518
